<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROYALHOKI77</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: white;
}

/* CONTAINER */
.container {
    max-width: 420px;
    margin: auto;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(255,215,0,0.3);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(255,215,0,0.2);
}

/* HEADER */
.header {
    padding: 18px;
    text-align: center;
    border-bottom: 1px solid rgba(255,215,0,0.3);
}

.header h1 {
    color: gold;
    font-size: 26px;
    letter-spacing: 2px;
    text-shadow: 0 0 10px gold;
}

.header p {
    font-size: 12px;
    color: #aaa;
}

/* IMAGE */
.banner img {
    width: 100%;
}

/* BUTTON */
.btn-group {
    display: flex;
    gap: 10px;
    padding: 15px;
}

.btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(45deg, #FFD700, #FFA500);
    color: black;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(255,215,0,0.4);
}

.btn:hover {
    transform: scale(1.05);
}

/* CONTENT */
.content {
    padding: 15px;
    text-align: center;
}

.title {
    font-size: 16px;
    color: gold;
    margin-bottom: 10px;
}

.desc {
    font-size: 13px;
    color: #ccc;
    line-height: 1.5;
}

/* BADGE */
.badge {
    display: flex;
    justify-content: space-around;
    margin: 15px 10px;
    font-size: 11px;
    color: #ddd;
}

.badge div {
    background: rgba(255,215,0,0.1);
    padding: 8px;
    border-radius: 8px;
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-around;
    border-top: 1px solid rgba(255,215,0,0.3);
    padding: 12px;
    font-size: 12px;
}

.nav div {
    cursor: pointer;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 11px;
    color: #888;
    padding: 10px;
}

/* NOTIF */
.notif {
    position: fixed;
    bottom: 80px;
    left: 10px;
    background: rgba(0,0,0,0.9);
    border: 1px solid gold;
    padding: 10px;
    border-radius: 10px;
    font-size: 12px;
    display: none;
    animation: fade 0.5s;
}

@keyframes fade {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>

<div class="container">

        <div class="desc">

    <div class="badge">

    </div>

    <div class="nav">

        <div onclick="go()">📝 Daftar</div>

        <div onclick="go()">🎧 Bantuan</div>
    </div>

    <div class="footer">
        © 2026 ROYALHOKI77
    </div>

</div>

<script>

}

</html>
